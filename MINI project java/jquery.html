<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="../../JQUERY/JS/jquery-4.0.0.js"></script>
    
</head>
<body>
   <p id="test">this is my paragraph</p>
   <p id="p1">hello !!</p>
   <p id="p2">click me</p>
   <p id="p3">double cil</p>
   <p id="p4">click[enter]</p>
  <script>
    $(document).ready(function(){
        $("#test").click(function(){
        $(this).hide();    
    });
    $("#p1").click(function(){
        $(this).hide();
        })
    $("#p2").click(function(){
        $(this).hide();
        })

    $("#p3").dblclick(function(){
        $(this).hide();
        })

    $("#p4").mouseout(function(){
        $(this).hide();
        })
    });

  </script>
    
</body>
</html>
